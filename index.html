<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#110e1c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>xanstory — visual storytelling</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" type="module"></script>

  <script>setTimeout(function(){var s=document.getElementById('splash');if(s){s.style.opacity='0';setTimeout(function(){s.remove();},500);}},5000);</script>
</head>
<body>

  <div id="splash">
    <div class="splash-logo">
      <svg class="splash-bf-icon" viewBox="0 0 24 24" fill="none">
        <defs><linearGradient id="splashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e07aff" /><stop offset="100%" stop-color="#8808c3" />
        </linearGradient></defs>
        <path d="M3 4C6 4 11 9 12 12C13 9 18 4 21 4C19 9 14 11 12 12C14 13 19 15 21 20C18 20 13 15 12 12C11 15 6 20 3 20C5 15 10 13 12 12C10 11 5 9 3 4Z" fill="url(#splashGrad)"/>
      </svg>
      <span class="splash-text">anstory</span>
    </div>
    <div class="splash-sub">visual storytelling</div>
    <div class="splash-loader"></div>
  </div>

  <div id="app">
    <div id="app-view"></div>

    <div id="fab-menu">
      <div class="fab-menu-items" id="fab-menu-items">
        <button class="fab-item" id="fab-write" data-route="/new" title="Write" style="display:none"><i class="fa-solid fa-feather"></i></button>
        <button class="fab-item" data-route="/settings" title="Settings"><i class="fa-solid fa-gear"></i></button>
        <button class="fab-item active" data-route="/" title="Home"><i class="fa-solid fa-house"></i></button>
      </div>
      <button class="fab-toggle" id="fab-toggle" aria-label="Menu">
        <svg class="fab-bf-icon" viewBox="0 0 40 34" fill="none">
          <g class="wing-l">
            <path d="M20,17 C13,4 3,1 2,11 C1,20 11,22 20,17 Z" fill="#cf5cf0" opacity="0.9"/>
            <path d="M20,17 C14,21 6,30 9,32 C13,33 17,24 20,17 Z" fill="#9b1fd0" opacity="0.8"/>
          </g>
          <g class="wing-r">
            <path d="M20,17 C27,4 37,1 38,11 C39,20 29,22 20,17 Z" fill="#cf5cf0" opacity="0.9"/>
            <path d="M20,17 C26,21 34,30 31,32 C27,33 23,24 20,17 Z" fill="#9b1fd0" opacity="0.8"/>
          </g>
          <ellipse cx="20" cy="17" rx="1.2" ry="7" fill="#f5ecff"/>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
